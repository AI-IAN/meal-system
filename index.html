<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="What Should I Eat?">
<meta name="theme-color" content="#111210">
<title>What Should I Eat?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Instrument+Serif:ital@1&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════
   THEME SYSTEM — 3 palettes via CSS custom properties
   ═══════════════════════════════════════════════════ */
:root, [data-theme="lime"] {
  --bg: #0a0c08;
  --bg-raised: #141610;
  --bg-surface: #1c1e18;
  --bg-card: #1e2018;
  --text: #e8e9e4;
  --text-dim: #a0a39a;
  --text-faint: #5c5f56;
  --border: rgba(144,216,64,0.06);
  --border-hi: rgba(144,216,64,0.14);
  --accent-1: #30b860;
  --accent-2: #90d840;
  --accent-gradient: linear-gradient(135deg, #30b860, #90d840);
  --accent-text: #90d840;
  --accent-dim: rgba(144,216,64,0.10);
  --accent-glow: rgba(144,216,64,0.06);
  --ready: #90d840;
  --ready-dim: rgba(144,216,64,0.12);
  --partial: #f0b840;
  --missing: #e85050;
  --nav-active: #90d840;
  --hero-glow: radial-gradient(ellipse 600px 300px at 50% 0%, rgba(48,184,96,0.08), transparent);
  --card-glow: radial-gradient(ellipse at 30% 0%, rgba(144,216,64,0.06), transparent 70%);
}

[data-theme="berry"] {
  --bg: #08060c;
  --bg-raised: #12101a;
  --bg-surface: #1a1624;
  --bg-card: #1e182a;
  --text: #ece8f0;
  --text-dim: #a098b0;
  --text-faint: #5a5270;
  --border: rgba(208,64,224,0.06);
  --border-hi: rgba(208,64,224,0.14);
  --accent-1: #d040e0;
  --accent-2: #f06090;
  --accent-gradient: linear-gradient(135deg, #d040e0, #f06090);
  --accent-text: #f06090;
  --accent-dim: rgba(240,96,144,0.10);
  --accent-glow: rgba(208,64,224,0.06);
  --ready: #50d8a0;
  --ready-dim: rgba(80,216,160,0.12);
  --partial: #f0b840;
  --missing: #e85050;
  --nav-active: #f06090;
  --hero-glow: radial-gradient(ellipse 600px 300px at 50% 0%, rgba(208,64,224,0.10), transparent);
  --card-glow: radial-gradient(ellipse at 30% 0%, rgba(240,96,144,0.06), transparent 70%);
}

[data-theme="coral"] {
  --bg: #0a0a0c;
  --bg-raised: #141416;
  --bg-surface: #1c1c1e;
  --bg-card: #201e22;
  --text: #e8e8ec;
  --text-dim: #a0a0a8;
  --text-faint: #5a5a62;
  --border: rgba(240,96,80,0.06);
  --border-hi: rgba(240,96,80,0.14);
  --accent-1: #f06050;
  --accent-2: #f8a870;
  --accent-gradient: linear-gradient(135deg, #f06050, #f8a870);
  --accent-text: #f8a870;
  --accent-dim: rgba(248,168,112,0.10);
  --accent-glow: rgba(240,96,80,0.06);
  --ready: #40c8a0;
  --ready-dim: rgba(64,200,160,0.12);
  --partial: #f0b840;
  --missing: #e85050;
  --nav-active: #f8a870;
  --hero-glow: radial-gradient(ellipse 600px 300px at 50% 0%, rgba(240,96,80,0.08), transparent);
  --card-glow: radial-gradient(ellipse at 30% 0%, rgba(248,168,112,0.06), transparent 70%);
}

/* ═══════════ RESET & BASE ═══════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{
  font-family:'Space Grotesk', -apple-system, sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100dvh;
  line-height:1.5;
  overscroll-behavior:none;
}
body{min-height:100dvh}
button{font-family:inherit;border:none;cursor:pointer;background:none;color:inherit}
input{font-family:inherit;border:none;outline:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}

.serif{font-family:'Instrument Serif', Georgia, serif;font-style:italic}
.mono{font-family:'IBM Plex Mono', 'SF Mono', monospace}

/* Subtle grain */
body::after{
  content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:0.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:128px;
}

/* ═══════════ LAYOUT ═══════════ */
.scene{
  min-height:100dvh;
  display:flex;flex-direction:column;
  padding-bottom:calc(72px + env(safe-area-inset-bottom, 0px));
}
.top-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 24px 0;
}
.back-link{
  font-size:12px;font-weight:500;letter-spacing:0.03em;
  color:var(--text-faint);transition:color 0.2s;
}
.back-link:hover{color:var(--text-dim)}
.theme-switcher{display:flex;gap:6px;align-items:center}
.theme-dot{
  width:12px;height:12px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:all 0.25s;opacity:0.4;
}
.theme-dot:hover{opacity:0.7;transform:scale(1.2)}
.theme-dot.active{opacity:1;border-color:rgba(255,255,255,0.4);transform:scale(1.2)}
.theme-dot[data-t="lime"]{background:#90d840}
.theme-dot[data-t="berry"]{background:#d040e0}
.theme-dot[data-t="coral"]{background:#f06050}

.content{flex:1;padding:16px 24px 24px}
@media(min-width:768px){
  .content{padding:20px 48px 32px;max-width:720px;margin:0 auto;width:100%}
  .top-bar{max-width:720px;margin:0 auto;width:100%;padding:16px 48px 0}
}
@media(min-width:1024px){
  .content{max-width:900px;padding:20px 60px 32px}
  .top-bar{max-width:900px;padding:16px 60px 0}
  .today-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start}
  .today-left{grid-column:1}
  .today-right{grid-column:2}
  .week-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start}
  .week-left{grid-column:1}
  .week-right{grid-column:2}
}

/* ═══════════ PANEL SYSTEM ═══════════ */
.panel{display:none}
.panel.active{display:block;animation:fadeUp 0.2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ═══════════ SECTION LABEL ═══════════ */
.label{
  font-size:11px;font-weight:600;letter-spacing:0.08em;
  text-transform:uppercase;color:var(--text-faint);
  margin-bottom:10px;
}

/* ═══════════ DAILY TRACKER ═══════════ */
.tracker{
  background:var(--bg-card);
  border:1px solid var(--border-hi);
  border-radius:14px;
  padding:18px 20px;
  margin-bottom:20px;
  position:relative;
}
.tracker::before{
  content:'';position:absolute;top:-1px;left:24px;right:24px;height:2px;
  background:var(--accent-gradient);border-radius:2px;
}
.tracker-title{
  font-family:'Instrument Serif', Georgia, serif;
  font-style:italic;font-size:20px;
  margin-bottom:14px;color:var(--text);
}
.tracker-bars{display:flex;flex-direction:column;gap:10px}
.bar-row{display:flex;align-items:center;gap:12px}
.bar-label{
  font-family:'IBM Plex Mono', monospace;
  font-size:11px;font-weight:500;color:var(--text-dim);
  width:48px;flex-shrink:0;
}
.bar-track{
  flex:1;height:8px;background:var(--bg-surface);
  border-radius:4px;overflow:hidden;
}
.bar-fill{
  height:100%;border-radius:4px;
  transition:width 0.5s ease;
  min-width:2px;
}
.bar-fill.on-track{background:var(--accent-gradient)}
.bar-fill.behind{background:var(--partial)}
.bar-fill.over{background:var(--ready)}
.bar-value{
  font-family:'IBM Plex Mono', monospace;
  font-size:11px;color:var(--text-faint);
  width:90px;flex-shrink:0;text-align:right;
}

/* ═══════════ QUICK LOG ═══════════ */
.quick-log{
  display:flex;gap:8px;margin-bottom:20px;
}
.quick-log input{
  flex:1;padding:12px 16px;font-size:14px;
  background:var(--bg-raised);
  border:1px solid var(--border-hi);
  border-radius:12px;color:var(--text);
  transition:border-color 0.2s;
}
.quick-log input:focus{border-color:var(--accent-1)}
.quick-log input::placeholder{color:var(--text-faint)}
.quick-log button{
  padding:0 16px;border-radius:12px;
  background:var(--accent-gradient);color:#0a0a0a;
  font-size:13px;font-weight:600;white-space:nowrap;
}
.log-dropdown{
  position:absolute;left:0;right:0;top:100%;
  background:var(--bg-card);border:1px solid var(--border-hi);
  border-radius:10px;margin-top:4px;
  max-height:240px;overflow-y:auto;z-index:50;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
}
.log-dropdown-item{
  padding:10px 16px;cursor:pointer;
  display:flex;justify-content:space-between;align-items:center;
  font-size:13px;transition:background 0.1s;
}
.log-dropdown-item:hover{background:var(--bg-surface)}
.log-dropdown-item .meta{
  font-family:'IBM Plex Mono', monospace;
  font-size:10px;color:var(--text-faint);
}
.quick-log-wrap{position:relative}

/* ═══════════ TODAY'S MEALS ═══════════ */
.today-meals{margin-bottom:20px}
.today-meal{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:10px;margin-bottom:4px;
  transition:all 0.15s;
}
.today-meal:hover{border-color:var(--border-hi)}
.today-meal .info{flex:1;min-width:0}
.today-meal .name{font-size:13px;font-weight:500}
.today-meal .meta{
  font-family:'IBM Plex Mono', monospace;
  font-size:10px;color:var(--text-faint);margin-top:1px;
}
.today-meal .time{
  font-family:'IBM Plex Mono', monospace;
  font-size:10px;color:var(--text-faint);flex-shrink:0;
}
.today-meal .del{
  color:var(--text-faint);font-size:14px;
  width:24px;height:24px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:all 0.15s;flex-shrink:0;
}
.today-meal:hover .del{opacity:1}
.today-meal .del:hover{color:var(--missing);background:rgba(232,80,80,0.08)}

.today-empty{
  text-align:center;padding:24px 20px;
  color:var(--text-faint);font-size:13px;
  font-style:italic;
}

/* ═══════════ SUGGESTION LIST ═══════════ */
.next-section{margin-bottom:20px}
.next-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:10px;margin-bottom:4px;transition:all 0.15s;
}
.next-item:hover{border-color:var(--border-hi)}
.next-info{flex:1;min-width:0}
.next-name{font-size:13px;font-weight:500}
.next-meta{
  font-family:'IBM Plex Mono', monospace;
  font-size:10px;color:var(--text-faint);margin-top:1px;
}
.next-actions{display:flex;gap:6px;flex-shrink:0}
.btn{
  padding:6px 12px;border-radius:7px;
  font-size:11px;font-weight:600;
  text-align:center;transition:all 0.15s;white-space:nowrap;
}
.btn:active{transform:scale(0.97)}
.btn-go{background:var(--accent-gradient);color:#0a0a0a}
.btn-go:hover{filter:brightness(1.1)}
.btn-skip{
  background:var(--bg-surface);color:var(--text-dim);
  border:1px solid var(--border);
}
.btn-skip:hover{color:var(--text);border-color:var(--border-hi)}

/* ═══════════ HISTORY (collapsible) ═══════════ */
.history-toggle{
  display:flex;align-items:center;gap:8px;
  padding:10px 0;cursor:pointer;
  font-size:12px;font-weight:600;letter-spacing:0.06em;
  text-transform:uppercase;color:var(--text-faint);
  user-select:none;
}
.history-toggle .arrow{transition:transform 0.2s;font-size:10px}
.history-toggle.collapsed .arrow{transform:rotate(-90deg)}
.history-items{display:flex;flex-direction:column;gap:4px}
.history-items.hidden{display:none}

/* ═══════════ POOL SECTION (Week tab) ═══════════ */
.pool-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;
}
.pool-actions{display:flex;gap:8px}
.pool-btn{
  padding:8px 16px;border-radius:10px;
  font-size:12px;font-weight:600;
  background:var(--accent-gradient);color:#0a0a0a;
  transition:all 0.15s;
}
.pool-btn:active{transform:scale(0.97)}
.pool-btn.secondary{
  background:var(--bg-surface);color:var(--text-dim);
  border:1px solid var(--border);
}

.pool-summary{
  padding:14px 16px;
  background:var(--bg-card);
  border:1px solid var(--border-hi);
  border-radius:12px;
  margin-bottom:12px;
}
.pool-totals{
  font-family:'IBM Plex Mono', monospace;
  font-size:13px;color:var(--accent-text);font-weight:500;
}
.pool-coverage{
  font-family:'IBM Plex Mono', monospace;
  font-size:11px;color:var(--text-dim);margin-top:4px;
}
.pool-guidance{
  font-size:12px;color:var(--text-faint);
  margin-top:6px;font-style:italic;
}

.pool-list{display:flex;flex-direction:column;gap:4px;margin-bottom:24px}
.pool-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:10px;transition:all 0.2s;
}
.pool-item:hover{border-color:var(--border-hi)}
.pool-item .info{flex:1;min-width:0}
.pool-item .name{font-size:13px;font-weight:500}
.pool-item .meta{
  font-family:'IBM Plex Mono', monospace;
  font-size:10px;color:var(--text-faint);margin-top:2px;
}
.pool-remove{
  width:28px;height:28px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-faint);font-size:14px;transition:all 0.15s;
}
.pool-remove:hover{color:var(--missing);background:rgba(232,80,80,0.08)}

.pool-empty{
  text-align:center;padding:40px 20px;
  color:var(--text-faint);font-size:13px;font-style:italic;
}

/* ═══════════ PANTRY (in Week tab) ═══════════ */
/* Pantry separator only on mobile (stacked) */
@media(max-width:1023px){
  .week-right{border-top:1px solid var(--border);padding-top:20px;margin-top:8px}
}
.pantry-bar{display:flex;gap:8px;margin-bottom:12px}
.pantry-bar input{
  flex:1;padding:12px 16px;font-size:14px;
  background:var(--bg-raised);border:1px solid var(--border-hi);
  border-radius:12px;color:var(--text);transition:border-color 0.2s;
}
.pantry-bar input:focus{border-color:var(--accent-1)}
.pantry-bar input::placeholder{color:var(--text-faint)}
.pantry-bar button{
  padding:0 16px;border-radius:12px;
  background:var(--accent-gradient);color:#0a0a0a;
  font-size:13px;font-weight:600;white-space:nowrap;
}
.pantry-stats{
  font-family:'IBM Plex Mono', monospace;
  font-size:11px;color:var(--text-faint);margin-bottom:12px;
}
.pantry-category{margin-bottom:12px}
.pantry-cat-header{
  display:flex;align-items:center;gap:8px;
  padding:6px 0;cursor:pointer;
  font-size:11px;font-weight:600;letter-spacing:0.06em;
  text-transform:uppercase;color:var(--text-faint);user-select:none;
}
.pantry-cat-header .arrow{transition:transform 0.2s;font-size:10px}
.pantry-cat-header.collapsed .arrow{transform:rotate(-90deg)}
.pantry-cat-count{
  font-family:'IBM Plex Mono', monospace;font-size:10px;color:var(--text-faint);
  background:var(--bg-surface);padding:1px 6px;border-radius:4px;
}
.pantry-items{display:flex;flex-direction:column;gap:3px}
.pantry-items.hidden{display:none}
.pantry-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 12px;background:var(--bg-card);
  border:1px solid var(--border);border-radius:8px;
  cursor:pointer;transition:all 0.15s;
}
.pantry-item:hover{border-color:var(--border-hi)}
.pantry-item-name{flex:1;font-size:13px;font-weight:500}
.pantry-qty{
  font-family:'IBM Plex Mono', monospace;font-size:10px;font-weight:500;
  padding:2px 7px;border-radius:5px;
}
.pantry-qty.plenty{background:var(--ready-dim);color:var(--ready)}
.pantry-qty.low{background:rgba(240,184,64,0.12);color:var(--partial)}
.pantry-qty.num{background:var(--accent-dim);color:var(--accent-text)}

/* ═══════════ SHOP PANEL ═══════════ */
.shop-top{display:flex;gap:8px;margin-bottom:12px}
.shop-top input{
  flex:1;padding:12px 16px;font-size:14px;
  background:var(--bg-raised);border:1px solid var(--border-hi);
  border-radius:12px;color:var(--text);transition:border-color 0.2s;
}
.shop-top input:focus{border-color:var(--accent-1)}
.shop-top input::placeholder{color:var(--text-faint)}
.shop-top .shop-add-btn{
  padding:0 16px;border-radius:12px;
  background:var(--accent-gradient);color:#0a0a0a;
  font-size:13px;font-weight:600;white-space:nowrap;
}
.shop-auto-btn{
  width:100%;padding:10px;border-radius:10px;
  font-size:12px;font-weight:600;
  background:var(--bg-surface);color:var(--text-dim);
  border:1px solid var(--border);margin-bottom:16px;
  transition:all 0.15s;
}
.shop-auto-btn:hover{color:var(--accent-text);border-color:var(--accent-dim)}
.shop-stats{
  font-family:'IBM Plex Mono', monospace;
  font-size:11px;color:var(--text-faint);margin-bottom:12px;
}
.shop-group-label{
  font-size:10px;font-weight:600;letter-spacing:0.08em;
  text-transform:uppercase;color:var(--text-faint);margin:16px 0 6px;
}
.shop-group-label:first-child{margin-top:4px}
.shop-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;background:var(--bg-card);
  border:1px solid var(--border);border-radius:8px;
  margin-bottom:3px;cursor:pointer;transition:all 0.15s;
}
.shop-item:hover{border-color:var(--border-hi)}
.shop-item.checked{opacity:0.4}
.shop-item.checked .shop-item-name{text-decoration:line-through}
.shop-check{
  width:18px;height:18px;border-radius:5px;
  border:2px solid var(--border-hi);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all 0.15s;font-size:11px;color:transparent;
}
.shop-item.checked .shop-check{
  background:var(--accent-gradient);border-color:transparent;color:#0a0a0a;
}
.shop-item-name{flex:1;font-size:13px;font-weight:500}
.shop-item-reason{
  font-family:'IBM Plex Mono', monospace;font-size:10px;color:var(--text-faint);white-space:nowrap;
}
.shop-bottom{display:flex;gap:8px;margin-top:16px}
.shop-bottom button{
  flex:1;padding:10px;border-radius:10px;
  font-size:12px;font-weight:600;transition:all 0.15s;
}
.shop-bottom button:active{transform:scale(0.97)}
.shop-pantry-btn{background:var(--accent-gradient);color:#0a0a0a}
.shop-clear-btn{background:var(--bg-surface);color:var(--text-dim);border:1px solid var(--border)}
.shop-empty{text-align:center;padding:60px 20px;color:var(--text-faint);font-size:14px;line-height:1.6}

/* ═══════════ TOAST ═══════════ */
.toast{
  position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);
  background:var(--bg-card);border:1px solid var(--accent-1);
  color:var(--text);padding:10px 20px;border-radius:10px;
  font-size:13px;font-weight:500;z-index:1000;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events:none;
}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.err{border-color:var(--missing)}

/* ═══════════ SKELETON ═══════════ */
.skel{
  background:linear-gradient(90deg, var(--bg-surface) 25%, var(--bg-card) 50%, var(--bg-surface) 75%);
  background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:12px;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{height:140px;border-radius:14px;margin-bottom:16px}
.skel-row{height:48px;margin-bottom:4px}

/* ═══════════ BOTTOM NAV ═══════════ */
.nav{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:var(--bg);border-top:1px solid var(--border);
  padding-bottom:env(safe-area-inset-bottom, 0px);
}
.nav-inner{display:flex;max-width:480px;margin:0 auto}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:8px 0 6px;color:var(--text-faint);
  font-size:9px;font-weight:500;letter-spacing:0.03em;transition:color 0.2s;
}
.nav-btn svg{width:22px;height:22px;transition:color 0.2s}
.nav-btn.active{color:var(--nav-active)}
.nav-btn:hover:not(.active){color:var(--text-dim)}

@media(min-width:768px){
  .nav{background:rgba(10,12,8,0.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
  .nav-inner{max-width:560px}
  .nav-btn{padding:10px 0 8px;font-size:10px;gap:3px}
  .nav-btn svg{width:24px;height:24px}
}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:3px}
</style>
</head>
<body>
<div class="scene">
  <div class="top-bar">
    <a href="/dashboard/index.html" class="back-link">&larr; Life OS</a>
    <div class="theme-switcher">
      <div class="theme-dot" data-t="lime" title="Fresh Lime"></div>
      <div class="theme-dot" data-t="berry" title="Electric Berry"></div>
      <div class="theme-dot" data-t="coral" title="Sunset Coral"></div>
    </div>
  </div>

  <div class="content">
    <!-- TODAY -->
    <div class="panel active" id="panel-today">
      <div class="today-grid">
        <div class="today-left">
          <div id="tracker-wrap">
            <div class="skel skel-card"></div>
          </div>
          <div class="quick-log-wrap">
            <div class="quick-log">
              <input type="text" id="log-input" placeholder="Log a meal..." autocomplete="off">
              <button id="log-btn">Log</button>
            </div>
            <div class="log-dropdown" id="log-dropdown" style="display:none"></div>
          </div>
          <div id="today-meals-wrap"></div>
          <div id="history-wrap"></div>
        </div>
        <div class="today-right">
          <div id="next-section-wrap"></div>
        </div>
      </div>
    </div>

    <!-- WEEK -->
    <div class="panel" id="panel-week">
      <div class="week-grid">
        <div class="week-left">
          <div class="pool-header">
            <div class="label" style="margin:0">This week's pool</div>
            <div class="pool-actions">
              <button class="pool-btn" id="pool-suggest-btn">Suggest</button>
              <button class="pool-btn secondary" id="pool-clear-btn">Clear</button>
            </div>
          </div>
          <div id="pool-wrap"></div>
        </div>

        <div class="week-right">
          <div class="label">Pantry</div>
          <div class="pantry-bar">
            <input type="text" id="pantry-input" placeholder="What did you buy?" autocomplete="off">
            <button id="pantry-add-btn">Add</button>
          </div>
          <div class="pantry-stats" id="pantry-stats"></div>
          <div id="pantry-categories"></div>
        </div>
      </div>
    </div>

    <!-- SHOP -->
    <div class="panel" id="panel-shop">
      <div class="shop-top">
        <input type="text" id="shop-input" placeholder="Add to list..." autocomplete="off">
        <button class="shop-add-btn" id="shop-add-btn">Add</button>
      </div>
      <button class="shop-auto-btn" id="shop-auto-btn">Build list from pantry + pool</button>
      <div id="shop-list-wrap"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<nav class="nav">
  <div class="nav-inner">
    <button class="nav-btn active" data-panel="today" aria-label="Today">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <span>Today</span>
    </button>
    <button class="nav-btn" data-panel="week" aria-label="Week">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="4" x2="9" y2="1"/><line x1="15" y1="4" x2="15" y2="1"/></svg>
      <span>Week</span>
    </button>
    <button class="nav-btn" data-panel="shop" aria-label="Shop">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      <span>Shop</span>
    </button>
  </div>
</nav>

<script>
/* ═══════════ STATE ═══════════ */
let allMeals = [];
let planData = { meals: [] };
let pantryItems = [];
let shopData = [];
let historyData = [];
let userProfile = null;
let suggestions = [];

/* ═══════════ UTIL ═══════════ */
function esc(s) { if(!s)return''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML }
function toast(msg, err) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (err ? ' err' : '');
  setTimeout(() => t.className = 'toast', 2500);
}
async function api(path, opts) {
  try {
    const r = await fetch(path, opts);
    if (!r.ok) throw new Error(r.status);
    return await r.json();
  } catch(e) { console.error('API:', path, e); return null }
}

/* ═══════════ THEME ═══════════ */
const dots = document.querySelectorAll('.theme-dot');
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('ms-theme', t);
  dots.forEach(d => d.classList.toggle('active', d.dataset.t === t));
}
dots.forEach(d => d.addEventListener('click', () => setTheme(d.dataset.t)));
setTheme(localStorage.getItem('ms-theme') || 'lime');

/* ═══════════ NAV ═══════════ */
const navBtns = document.querySelectorAll('.nav-btn');
const panels = document.querySelectorAll('.panel');
function switchPanel(name) {
  panels.forEach(p => p.classList.toggle('active', p.id === 'panel-' + name));
  navBtns.forEach(b => b.classList.toggle('active', b.dataset.panel === name));
  if (name === 'today') renderToday();
  if (name === 'week') { renderPool(); renderPantry(); }
  if (name === 'shop') renderShop();
}
navBtns.forEach(b => b.addEventListener('click', () => switchPanel(b.dataset.panel)));

/* ═══════════ LOAD ALL DATA ═══════════ */
async function loadAll() {
  const [mealsResp, plan, pantry, hist, shop, profile, sugg] = await Promise.all([
    api('/api/meals'), api('/api/plan'), api('/api/pantry'),
    api('/api/history'), api('/api/shop'), api('/api/profile'),
    api('/api/suggestions')
  ]);
  if (mealsResp) allMeals = mealsResp.meals || mealsResp || [];
  if (plan) planData = plan.meals ? plan : { meals: plan.meals || [] };
  if (pantry) pantryItems = pantry;
  if (hist) historyData = hist;
  if (shop) shopData = Array.isArray(shop) ? shop : [];
  if (profile && !profile.error) userProfile = profile;
  if (sugg) suggestions = sugg;
  renderToday();
}

/* ═══════════════════════════════════════════
   TODAY TAB
   ═══════════════════════════════════════════ */
function getTodayMeals() {
  const today = new Date().toISOString().slice(0,10);
  return historyData.filter(h => (h.logged_at||'').startsWith(today));
}

function getTodayNutrition() {
  const todayMeals = getTodayMeals();
  let cal = 0, pro = 0, fib = 0;
  todayMeals.forEach(h => {
    const meal = allMeals.find(m => m.name.toLowerCase() === h.meal_name.toLowerCase());
    if (meal) {
      cal += meal.cal || 0;
      pro += meal.protein || 0;
      fib += meal.fiber || 0;
    }
  });
  return { cal, pro, fib };
}

function renderToday() {
  renderTracker();
  renderTodayMeals();
  renderNextSuggestions();
  renderHistory();
}

function renderTracker() {
  const wrap = document.getElementById('tracker-wrap');
  const n = getTodayNutrition();
  const p = userProfile || { cal_target: 2700, protein_target_g: 150, fiber_target_g: 38 };

  const calPct = Math.min(100, Math.round(n.cal / p.cal_target * 100));
  const proPct = Math.min(100, Math.round(n.pro / p.protein_target_g * 100));
  const fibPct = Math.min(100, Math.round(n.fib / p.fiber_target_g * 100));

  function barClass(pct) {
    if (pct >= 100) return 'over';
    if (pct >= 60) return 'on-track';
    return 'behind';
  }

  const todayCount = getTodayMeals().length;
  const greeting = todayCount === 0 ? "Nothing logged yet today" :
    `${todayCount} meal${todayCount>1?'s':''} logged`;

  wrap.innerHTML = `
    <div class="tracker">
      <div class="tracker-title">${greeting}</div>
      <div class="tracker-bars">
        <div class="bar-row">
          <span class="bar-label">Cal</span>
          <div class="bar-track"><div class="bar-fill ${barClass(calPct)}" style="width:${calPct}%"></div></div>
          <span class="bar-value">${n.cal} / ${p.cal_target}</span>
        </div>
        <div class="bar-row">
          <span class="bar-label">Protein</span>
          <div class="bar-track"><div class="bar-fill ${barClass(proPct)}" style="width:${proPct}%"></div></div>
          <span class="bar-value">${n.pro}g / ${p.protein_target_g}g</span>
        </div>
        <div class="bar-row">
          <span class="bar-label">Fiber</span>
          <div class="bar-track"><div class="bar-fill ${barClass(fibPct)}" style="width:${fibPct}%"></div></div>
          <span class="bar-value">${n.fib}g / ${p.fiber_target_g}g</span>
        </div>
      </div>
    </div>`;
}

function renderTodayMeals() {
  const wrap = document.getElementById('today-meals-wrap');
  const todayMeals = getTodayMeals();

  if (!todayMeals.length) {
    wrap.innerHTML = '';
    return;
  }

  let h = '<div class="label">Eaten today</div><div class="today-meals">';
  todayMeals.forEach(item => {
    const meal = allMeals.find(m => m.name.toLowerCase() === item.meal_name.toLowerCase());
    const cal = meal ? meal.cal : '';
    const pro = meal ? meal.protein : '';
    const fib = meal ? meal.fiber : '';
    const time = (item.logged_at||'').slice(11,16);
    const metaParts = [];
    if (cal) metaParts.push(`${cal} cal`);
    if (pro) metaParts.push(`${pro}g pro`);
    if (fib) metaParts.push(`${fib}g fib`);

    h += `<div class="today-meal">
      <div class="info">
        <div class="name">${esc(item.meal_name)}</div>
        ${metaParts.length ? `<div class="meta">${metaParts.join(' \u00b7 ')}</div>` : ''}
      </div>
      ${time ? `<span class="time">${time}</span>` : ''}
      <button class="del" data-id="${item.id}" title="Remove">&times;</button>
    </div>`;
  });
  h += '</div>';
  wrap.innerHTML = h;

  // Bind delete
  wrap.querySelectorAll('.del').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (await api(`/api/history/${btn.dataset.id}`, {method:'DELETE'})) {
        toast('Removed');
        historyData = historyData.filter(h => h.id != btn.dataset.id);
        renderToday();
      }
    });
  });
}

function renderNextSuggestions() {
  const wrap = document.getElementById('next-section-wrap');
  const todayNames = new Set(getTodayMeals().map(m => m.meal_name.toLowerCase()));
  const poolMeals = (planData.meals || []);
  const n = getTodayNutrition();
  const p = userProfile || { cal_target: 2700, protein_target_g: 150, fiber_target_g: 38 };
  const calRemaining = p.cal_target - n.cal;

  // Pool meals not yet eaten today, then general suggestions
  let nextMeals = [];
  poolMeals.forEach(name => {
    if (!todayNames.has(name.toLowerCase())) {
      const meal = allMeals.find(m => m.name.toLowerCase() === name.toLowerCase());
      if (meal) nextMeals.push({ ...meal, source: 'pool' });
    }
  });
  // Add suggestions not in pool and not eaten today
  const poolSet = new Set(poolMeals.map(n => n.toLowerCase()));
  suggestions.forEach(s => {
    if (!todayNames.has(s.meal_name.toLowerCase()) && !poolSet.has(s.meal_name.toLowerCase())) {
      const meal = allMeals.find(m => m.name.toLowerCase() === s.meal_name.toLowerCase());
      if (meal) nextMeals.push({ ...meal, source: 'suggestion', reasons: s.reasons });
    }
  });

  // Limit to 5
  nextMeals = nextMeals.slice(0, 5);

  if (!nextMeals.length) {
    wrap.innerHTML = '';
    return;
  }

  let h = `<div class="label">What's next${calRemaining > 0 ? ` \u00b7 ~${calRemaining} cal remaining` : ''}</div>`;
  h += '<div class="next-section">';
  nextMeals.forEach(meal => {
    const metaParts = [];
    if (meal.cal) metaParts.push(`${meal.cal} cal`);
    if (meal.protein) metaParts.push(`${meal.protein}g pro`);
    if (meal.fiber) metaParts.push(`${meal.fiber}g fib`);
    if (meal.time) metaParts.push(meal.time);

    const reason = meal.source === 'pool' ? 'From your pool' :
      (meal.reasons && meal.reasons[0]) || '';

    h += `<div class="next-item">
      <div class="next-info">
        <div class="next-name">${esc(meal.name)}</div>
        ${metaParts.length ? `<div class="next-meta">${metaParts.join(' \u00b7 ')}</div>` : ''}
      </div>
      <div class="next-actions">
        <button class="btn btn-go" onclick="logMeal('${esc(meal.name)}')">Ate this</button>
        ${meal.source !== 'pool' ? `<button class="btn btn-skip" onclick="addToPool('${esc(meal.name)}')">Pool</button>` : ''}
      </div>
    </div>`;
  });
  h += '</div>';
  wrap.innerHTML = h;
}

function renderHistory() {
  const wrap = document.getElementById('history-wrap');
  const today = new Date().toISOString().slice(0,10);
  const past = historyData.filter(h => !(h.logged_at||'').startsWith(today));

  if (!past.length) { wrap.innerHTML = ''; return; }

  const collapsed = wrap.dataset.collapsed !== 'false';

  let h = `<div class="history-toggle ${collapsed?'collapsed':''}" id="history-toggle">
    <span class="arrow">\u25BC</span> Recent history (${past.length})
  </div>`;
  h += `<div class="history-items ${collapsed?'hidden':''}" id="history-items">`;

  // Group by date
  const groups = {};
  past.forEach(item => {
    const d = (item.logged_at||'').slice(0,10);
    const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
    let label = d;
    if (d === yesterday) label = 'Yesterday';
    else { const dt = new Date(d+'T12:00:00'); label = dt.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}) }
    (groups[label] = groups[label]||[]).push(item);
  });

  for (const [label, items] of Object.entries(groups)) {
    h += `<div style="font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-faint);margin:12px 0 6px">${esc(label)}</div>`;
    items.forEach(item => {
      const time = (item.logged_at||'').slice(11,16);
      const meal = allMeals.find(m => m.name.toLowerCase() === item.meal_name.toLowerCase());
      const metaParts = [];
      if (meal && meal.cal) metaParts.push(`${meal.cal} cal`);
      if (meal && meal.protein) metaParts.push(`${meal.protein}g pro`);

      h += `<div class="today-meal">
        <div class="info">
          <div class="name">${esc(item.meal_name)}</div>
          ${metaParts.length ? `<div class="meta">${metaParts.join(' \u00b7 ')}</div>` : ''}
        </div>
        ${time ? `<span class="time">${time}</span>` : ''}
      </div>`;
    });
  }
  h += '</div>';
  wrap.innerHTML = h;

  document.getElementById('history-toggle').addEventListener('click', () => {
    const items = document.getElementById('history-items');
    const toggle = document.getElementById('history-toggle');
    const isHidden = items.classList.contains('hidden');
    items.classList.toggle('hidden');
    toggle.classList.toggle('collapsed');
    wrap.dataset.collapsed = isHidden ? 'false' : 'true';
  });
}

/* ═══════════ QUICK LOG ═══════════ */
const logInput = document.getElementById('log-input');
const logDropdown = document.getElementById('log-dropdown');

logInput.addEventListener('input', () => {
  const q = logInput.value.trim().toLowerCase();
  if (q.length < 1) { logDropdown.style.display = 'none'; return; }
  const matches = allMeals.filter(m => m.name.toLowerCase().includes(q)).slice(0, 8);
  if (!matches.length) { logDropdown.style.display = 'none'; return; }

  logDropdown.innerHTML = matches.map(m => {
    const meta = [];
    if (m.cal) meta.push(`${m.cal} cal`);
    if (m.protein) meta.push(`${m.protein}g pro`);
    return `<div class="log-dropdown-item" data-name="${esc(m.name)}">
      <span>${esc(m.name)}</span>
      <span class="meta">${meta.join(' \u00b7 ')}</span>
    </div>`;
  }).join('');
  logDropdown.style.display = 'block';

  logDropdown.querySelectorAll('.log-dropdown-item').forEach(el => {
    el.addEventListener('click', () => {
      logMeal(el.dataset.name);
      logDropdown.style.display = 'none';
      logInput.value = '';
    });
  });
});

logInput.addEventListener('blur', () => setTimeout(() => logDropdown.style.display = 'none', 200));
logInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const q = logInput.value.trim();
    if (!q) return;
    const match = allMeals.find(m => m.name.toLowerCase() === q.toLowerCase());
    if (match) { logMeal(match.name); logInput.value = ''; logDropdown.style.display = 'none'; }
    else toast('Meal not found — try searching', true);
  }
});

document.getElementById('log-btn').addEventListener('click', () => {
  const q = logInput.value.trim();
  if (!q) return;
  const match = allMeals.find(m => m.name.toLowerCase() === q.toLowerCase());
  if (match) { logMeal(match.name); logInput.value = ''; logDropdown.style.display = 'none'; }
  else toast('Meal not found — try searching', true);
});

async function logMeal(name) {
  const r = await api('/api/log-meal', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({meal_name:name, energy_level:'', notes:''})
  });
  if (r) {
    toast(`Logged ${name}`);
    // Add to local history
    historyData.unshift({ id: Date.now(), meal_name: name, logged_at: new Date().toISOString() });
    // Auto-remove from pool if present
    const poolIdx = (planData.meals||[]).findIndex(m => m.toLowerCase() === name.toLowerCase());
    if (poolIdx !== -1) {
      planData.meals.splice(poolIdx, 1);
      await api('/api/plan', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(planData)});
    }
    renderToday();
  } else toast('Failed to log', true);
}

/* ═══════════════════════════════════════════
   WEEK TAB — Pool + Pantry
   ═══════════════════════════════════════════ */
function renderPool() {
  const wrap = document.getElementById('pool-wrap');
  const meals = planData.meals || [];

  if (!meals.length) {
    wrap.innerHTML = '<div class="pool-empty">No meals in your pool. Hit Suggest to build your week.</div>';
    return;
  }

  let h = '';

  // Summary
  let totalCal = 0, totalPro = 0, totalFib = 0;
  meals.forEach(name => {
    const meal = allMeals.find(m => m.name.toLowerCase() === name.toLowerCase());
    if (meal) { totalCal += meal.cal||0; totalPro += meal.protein||0; totalFib += meal.fiber||0; }
  });

  if (userProfile) {
    const days = userProfile.cal_target ? (totalCal / userProfile.cal_target).toFixed(1) : '?';
    const homeMeals = userProfile.home_meals_per_week || 16;
    const more = Math.max(0, homeMeals - meals.length);
    h += `<div class="pool-summary">
      <div class="pool-totals">${totalCal} cal \u00b7 ${totalPro}g protein \u00b7 ${totalFib}g fiber</div>
      <div class="pool-coverage">Covers ~${days} days at ${userProfile.cal_target} cal/day</div>
      <div class="pool-guidance">${meals.length} meals pooled${more > 0 ? ` \u2014 add ~${more} more for the week` : ' \u2014 you\'re set for the week'}</div>
    </div>`;
  }

  h += '<div class="pool-list">';
  meals.forEach((name, idx) => {
    const meal = allMeals.find(m => m.name.toLowerCase() === name.toLowerCase());
    const metaParts = [];
    if (meal) {
      if (meal.cal) metaParts.push(`${meal.cal} cal`);
      if (meal.protein) metaParts.push(`${meal.protein}g pro`);
      if (meal.fiber) metaParts.push(`${meal.fiber}g fib`);
    }
    h += `<div class="pool-item">
      <div class="info">
        <div class="name">${esc(name)}</div>
        ${metaParts.length ? `<div class="meta">${metaParts.join(' \u00b7 ')}</div>` : ''}
      </div>
      <button class="pool-remove" onclick="removePool(${idx})">\u2715</button>
    </div>`;
  });
  h += '</div>';
  wrap.innerHTML = h;
}

async function addToPool(name) {
  if (!planData.meals) planData.meals = [];
  if (planData.meals.length >= 15) { toast('Pool is full (15 max)', true); return; }
  if (planData.meals.some(m => m.toLowerCase() === name.toLowerCase())) { toast('Already in pool'); return; }
  planData.meals.push(name);
  await api('/api/plan', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(planData)});
  toast(`Added ${name} to pool`);
  renderToday(); // refresh suggestions
}

async function removePool(idx) {
  const name = planData.meals[idx];
  planData.meals.splice(idx, 1);
  await api('/api/plan', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(planData)});
  toast(`Removed ${name}`);
  renderPool();
}

// Suggest button
document.getElementById('pool-suggest-btn').addEventListener('click', async () => {
  const data = await api('/api/suggestions');
  if (!data || !data.length) { toast('No suggestions available', true); return; }
  const good = data.filter(s => s.score > 0.3).slice(0, 7);
  if (!good.length) { toast('Nothing scored high enough. Stock your pantry!', true); return; }
  if (!planData.meals) planData.meals = [];
  const added = [];
  for (const s of good) {
    if (planData.meals.length >= 15) break;
    if (!planData.meals.some(m => m.toLowerCase() === s.meal_name.toLowerCase())) {
      planData.meals.push(s.meal_name);
      added.push(s.meal_name);
    }
  }
  if (added.length) {
    await api('/api/plan', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(planData)});
    toast(`Added ${added.length} meals`);
    renderPool();
  } else {
    toast('Those are already in your pool');
  }
});

// Clear button
document.getElementById('pool-clear-btn').addEventListener('click', async () => {
  planData.meals = [];
  await api('/api/plan', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(planData)});
  toast('Pool cleared');
  renderPool();
});

/* ═══════════ PANTRY ═══════════ */
const PANTRY_CATEGORIES = {
  'fresh': 'Fresh',
  'proteins-dairy': 'Proteins & Dairy',
  'frozen': 'Frozen',
  'pantry-dry': 'Pantry & Dry',
  'snacks-bars': 'Snacks & Bars'
};
const pantryCollapsed = {};

function renderPantry() {
  const stocked = pantryItems.filter(p => p.qty !== '0' && p.qty !== 0).length;
  const low = pantryItems.filter(p => p.qty === 'low').length;
  document.getElementById('pantry-stats').textContent = `${stocked} items stocked \u00b7 ${low} running low`;

  const groups = {};
  for (const cat of Object.keys(PANTRY_CATEGORIES)) groups[cat] = [];
  pantryItems.forEach(item => {
    const cat = item.category || 'pantry-dry';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(item);
  });

  for (const cat of Object.keys(groups)) {
    groups[cat].sort((a, b) => {
      const aLow = a.qty === 'low' || a.qty === '0' || a.qty === 0 ? 1 : 0;
      const bLow = b.qty === 'low' || b.qty === '0' || b.qty === 0 ? 1 : 0;
      if (aLow !== bLow) return aLow - bLow;
      return (a.name||'').localeCompare(b.name||'');
    });
  }

  let h = '';
  for (const [cat, label] of Object.entries(PANTRY_CATEGORIES)) {
    const items = groups[cat] || [];
    if (!items.length) continue;
    const collapsed = pantryCollapsed[cat];
    h += `<div class="pantry-category">`;
    h += `<div class="pantry-cat-header${collapsed?' collapsed':''}" data-cat="${esc(cat)}">`;
    h += `<span class="arrow">\u25BC</span> <span>${esc(label)}</span>`;
    h += ` <span class="pantry-cat-count">${items.length}</span>`;
    h += `</div>`;
    h += `<div class="pantry-items${collapsed?' hidden':''}">`;
    items.forEach(item => {
      const qtyClass = item.qty === 'plenty' ? 'plenty' : item.qty === 'low' ? 'low' : 'num';
      const qtyLabel = typeof item.qty === 'number' ? `\u00d7${item.qty}` : item.qty || 'plenty';
      h += `<div class="pantry-item" data-name="${esc(item.name)}">`;
      h += `<span class="pantry-item-name">${esc(item.name)}</span>`;
      h += `<span class="pantry-qty ${qtyClass}">${esc(qtyLabel)}</span>`;
      h += `</div>`;
    });
    h += `</div></div>`;
  }
  document.getElementById('pantry-categories').innerHTML = h;

  document.querySelectorAll('.pantry-cat-header').forEach(hdr => {
    hdr.addEventListener('click', () => {
      const cat = hdr.dataset.cat;
      pantryCollapsed[cat] = !pantryCollapsed[cat];
      hdr.classList.toggle('collapsed');
      hdr.nextElementSibling.classList.toggle('hidden');
    });
  });
  document.querySelectorAll('.pantry-item').forEach(el => {
    el.addEventListener('click', () => cyclePantryQty(el.dataset.name));
  });
}

async function cyclePantryQty(name) {
  const idx = pantryItems.findIndex(p => p.name === name);
  if (idx === -1) return;
  const item = pantryItems[idx];
  if (item.qty === 'plenty') { item.qty = 'low'; toast(`${name} marked low`); }
  else if (item.qty === 'low') { pantryItems.splice(idx, 1); toast(`${name} removed`); }
  else { item.qty = 'low'; toast(`${name} marked low`); }
  await api('/api/pantry', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(pantryItems)});
  renderPantry();
}

document.getElementById('pantry-add-btn').addEventListener('click', addPantryItems);
document.getElementById('pantry-input').addEventListener('keydown', e => { if (e.key==='Enter') addPantryItems() });

async function addPantryItems() {
  const input = document.getElementById('pantry-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  const items = text.split(',').map(s => s.trim()).filter(Boolean);
  if (!items.length) return;
  const added = items.map(name => ({name, qty:'plenty', category:'pantry-dry'}));
  pantryItems.push(...added);
  if (await api('/api/pantry', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(pantryItems)})) {
    toast(`Added ${items.join(', ')}`);
    renderPantry();
  }
}

/* ═══════════════════════════════════════════
   SHOP TAB
   ═══════════════════════════════════════════ */
function renderShop() {
  const wrap = document.getElementById('shop-list-wrap');
  if (!shopData.length) {
    wrap.innerHTML = '<div class="shop-empty">No items on the list. Build from pantry + pool, or add manually.</div>';
    return;
  }

  const lowItems = shopData.filter(i => i.reason === 'running low');
  const planItems = shopData.filter(i => i.reason && i.reason !== 'running low' && i.reason !== 'manual');
  const manualItems = shopData.filter(i => i.reason === 'manual' || !i.reason);
  const totalCount = shopData.length;
  const checkedCount = shopData.filter(i => i.checked).length;

  let h = `<div class="shop-stats">${totalCount} items \u00b7 ${checkedCount} checked</div>`;

  function renderGroup(label, items) {
    if (!items.length) return '';
    let g = `<div class="shop-group-label">${esc(label)}</div>`;
    items.forEach(item => {
      const globalIdx = shopData.indexOf(item);
      g += `<div class="shop-item${item.checked?' checked':''}" data-idx="${globalIdx}">`;
      g += `<div class="shop-check">${item.checked?'\u2713':''}</div>`;
      g += `<span class="shop-item-name">${esc(item.name)}</span>`;
      if (item.reason && item.reason !== 'manual') g += `<span class="shop-item-reason">${esc(item.reason)}</span>`;
      g += `</div>`;
    });
    return g;
  }

  h += renderGroup('Running low', lowItems);
  h += renderGroup('For pooled meals', planItems);
  h += renderGroup('Manual', manualItems);

  h += '<div class="shop-bottom">';
  h += '<button class="shop-pantry-btn" id="shop-to-pantry">Add checked to pantry</button>';
  h += '<button class="shop-clear-btn" id="shop-clear-checked">Clear checked</button>';
  h += '</div>';

  wrap.innerHTML = h;

  wrap.querySelectorAll('.shop-item').forEach(el => {
    el.addEventListener('click', async () => {
      const idx = parseInt(el.dataset.idx);
      shopData[idx].checked = !shopData[idx].checked;
      await api('/api/shop', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(shopData)});
      renderShop();
    });
  });

  document.getElementById('shop-to-pantry').addEventListener('click', async () => {
    const checked = shopData.filter(i => i.checked);
    if (!checked.length) { toast('Check some items first'); return; }
    const newItems = checked.map(i => ({name: i.name, qty: 'plenty', category: 'pantry-dry'}));
    pantryItems.push(...newItems);
    await api('/api/pantry', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(pantryItems)});
    shopData = shopData.filter(i => !i.checked);
    await api('/api/shop', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(shopData)});
    toast(`Added ${checked.length} items to pantry`);
    renderShop();
  });

  document.getElementById('shop-clear-checked').addEventListener('click', async () => {
    const removed = shopData.filter(i => i.checked).length;
    if (!removed) { toast('Nothing checked'); return; }
    shopData = shopData.filter(i => !i.checked);
    await api('/api/shop', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(shopData)});
    toast(`Cleared ${removed} items`);
    renderShop();
  });
}

document.getElementById('shop-add-btn').addEventListener('click', addShopItems);
document.getElementById('shop-input').addEventListener('keydown', e => { if (e.key==='Enter') addShopItems() });

async function addShopItems() {
  const inp = document.getElementById('shop-input');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  const items = text.split(',').map(s => s.trim()).filter(Boolean);
  items.forEach(name => shopData.push({name, reason:'manual', checked:false}));
  await api('/api/shop', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(shopData)});
  toast(`Added ${items.join(', ')}`);
  renderShop();
}

document.getElementById('shop-auto-btn').addEventListener('click', async () => {
  const auto = await api('/api/shop/auto');
  if (!auto || !auto.length) { toast('Nothing to add \u2014 pantry and pool look good!'); return; }
  const existing = new Set(shopData.map(i => i.name.toLowerCase()));
  let added = 0;
  auto.forEach(item => {
    if (!existing.has(item.name.toLowerCase())) {
      shopData.push(item);
      existing.add(item.name.toLowerCase());
      added++;
    }
  });
  await api('/api/shop', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(shopData)});
  toast(`Added ${added} items from pantry + pool`);
  renderShop();
});

loadAll();
